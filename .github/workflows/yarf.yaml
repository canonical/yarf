name: Testing and quality control for YARF codebase

on:
  merge_group:
    types: [checks_requested]
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!snap/**'
      - '!.github/workflows/*'
      - '.github/workflows/yarf.yaml'

permissions:
  contents: read  # Required to check out repository code
  actions: write  # Required by rerun-failed-noble to call the re-run API

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-jammy:
    name: Jammy - Install and sync
    runs-on: [self-hosted, linux, jammy, x64, large]
    steps:
    - name: Install dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y \
          git-lfs \
          libgl1 \
          libxkbcommon-dev \
          jq \
          clang \
          python3-tk

    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        lfs: true
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.10"
    - name: Install uv
      run: pip install uv
    - name: Sync Python dependencies
      run: uv sync --python 3.10

  tests-noble:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Noble - Unit tests
            slug: unit
            script: run-unit-tests.sh
            with-mir: "false"
            fetch-depth: "0"
          - name: Noble - Integration tests
            slug: integration
            script: run-integration-tests.sh
            with-mir: "true"
          - name: Noble - Tutorial tests (default)
            slug: tutorial-default
            script: run-tutorial-tests.sh
            with-mir: "true"
          - name: Noble - Tutorial tests (light)
            slug: tutorial-light
            script: run-tutorial-tests.sh light
            with-mir: "true"
          - name: Noble - Keyword tests (video_image_test)
            slug: keyword-video_image_test
            script: run-keyword-suite.sh video_image_test
            with-mir: "true"
            keyword-coverage: "true"
          - name: Noble - Keyword tests (video_text_test)
            slug: keyword-video_text_test
            script: run-keyword-suite.sh video_text_test
            with-mir: "true"
            keyword-coverage: "true"
          - name: Noble - Keyword tests (video_video_test)
            slug: keyword-video_video_test
            script: run-keyword-suite.sh video_video_test
            with-mir: "true"
            keyword-coverage: "true"
          - name: Noble - Keyword tests (hid_keyboard_test)
            slug: keyword-hid_keyboard_test
            script: run-keyword-suite.sh hid_keyboard_test
            with-mir: "true"
            keyword-coverage: "true"
          - name: Noble - Keyword tests (hid_pointer_test)
            slug: keyword-hid_pointer_test
            script: run-keyword-suite.sh hid_pointer_test
            with-mir: "true"
            keyword-coverage: "true"
          - name: Noble - Keyword tests (kvm_test)
            slug: keyword-kvm_test
            script: run-keyword-suite.sh kvm_test
            with-mir: "true"
            keyword-coverage: "true"
          - name: Noble - Keyword tests (llm_client_test)
            slug: keyword-llm_client_test
            script: run-keyword-suite.sh llm_client_test
            with-mir: "true"
            keyword-coverage: "true"
    env:
      KEYWORDS_LISTENER_PATH: .github/scripts/yarf/keywords_listener.py
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        lfs: true
        fetch-depth: ${{ matrix.fetch-depth || 1 }}
        persist-credentials: false

    - uses: ./.github/actions/setup-yarf-noble
      with:
        with-mir: ${{ matrix.with-mir }}

    - name: Run ${{ matrix.name }}
      env:
        SCRIPT: ${{ matrix.script }}
      # shellcheck disable=SC2086  # SCRIPT may include the script's argument
      run: ./.github/scripts/yarf/${SCRIPT}

    - if: matrix.slug == 'unit'
      name: Upload Coverage Report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: coverage
        path: ./coverage.xml
        retention-days: 5
        overwrite: true

    - if: matrix.keyword-coverage == 'true' && always()
      name: Upload per-suite keyword coverage
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: keywords-coverage-${{ matrix.slug }}
        path: keywords_coverage.json
        retention-days: 1
        if-no-files-found: error
        overwrite: true

    - if: failure()
      name: Collect test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: yarf-output-${{ matrix.slug }}
        path: /tmp/yarf-outdir/*
        retention-days: 5
        if-no-files-found: ignore
        overwrite: true

    - if: failure() && runner.debug
      name: Setup upterm session (restart with "Enable debug logging" to activate)
      uses: canonical/action-tmate@a0e8caed3bba2ccb98901a274553bf1284ad96c2  # zizmor: ignore[stale-action-refs]
      with:
        limit-access-to-actor: true

  keyword-coverage-noble:
    name: Noble - Keyword coverage check
    runs-on: ubuntu-24.04
    needs: tests-noble
    if: always()
    env:
      KEYWORDS_COVERAGE_CHECKER: .github/scripts/yarf/check_unused_keywords.py
      COVERAGE_MERGER: .github/scripts/yarf/merge-keywords-coverage.py
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - name: Download per-suite coverage artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        path: coverage-artifacts
        pattern: keywords-coverage-*

    - name: Merge keyword coverage
      run: python3 ${COVERAGE_MERGER} coverage-artifacts

    - name: Check Keywords coverage
      run: |
        pip install tabulate
        python3 ${KEYWORDS_COVERAGE_CHECKER}

  rerun-failed-noble:
    name: Re-run failed Noble jobs
    runs-on: ubuntu-24.04
    needs: [tests-noble, keyword-coverage-noble]
    # Trigger only if something upstream failed, and cap total attempts at 3
    # (initial + up to 2 reruns). `exit 1` at the end keeps this job itself
    # eligible for re-run, so the third attempt can still be triggered.
    if: failure() && fromJSON(github.run_attempt) < 3
    permissions:
      actions: write
    steps:
    - name: Re-run failed jobs
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        ATTEMPT: ${{ github.run_attempt }}
      run: |
        echo "::warning::Noble jobs failed on attempt ${ATTEMPT}/3, triggering re-run of failed jobs"
        # Brief delay so the run's failed state is fully registered
        sleep 15
        gh api -X POST "/repos/${REPO}/actions/runs/${RUN_ID}/rerun-failed-jobs"
        # Mark this job failed so it is included in the next rerun-failed-jobs
        # call, enabling a third overall attempt.
        exit 1
