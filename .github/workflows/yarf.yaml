name: Testing and quality control for YARF codebase

on:
  merge_group:
    types: [checks_requested]
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!snap/**'
      - '!.github/workflows/*'
      - '.github/workflows/yarf.yaml'

permissions:
  contents: read  # Required to check out repository code

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-jammy:
    name: Jammy - Install and sync
    runs-on: [self-hosted, linux, jammy, x64, large]
    steps:
    - name: Install dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y \
          git-lfs \
          libgl1 \
          libxkbcommon-dev \
          jq \
          clang \
          python3-tk

    - name: Checkout Repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        lfs: true
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.10"
    - name: Install uv
      run: pip install uv
    - name: Sync Python dependencies
      run: uv sync --python 3.10

  install-noble:
    name: Noble - Install and sync
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - uses: ./.github/actions/setup-yarf-noble

    - name: Sync Python dependencies
      run: uv sync --python 3.12

  tests-noble:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    needs: install-noble
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Noble - Unit tests
            slug: unit
            script: run-unit-tests.sh
            with-mir: "false"
            fetch-depth: "0"
          - name: Noble - Integration tests
            slug: integration
            script: run-integration-tests.sh
            with-mir: "true"
          - name: Noble - Tutorial tests (default)
            slug: tutorial-default
            script: run-tutorial-tests.sh
            with-mir: "true"
          - name: Noble - Tutorial tests (light)
            slug: tutorial-light
            script: run-tutorial-tests.sh light
            with-mir: "true"
    env:
      KEYWORDS_LISTENER_PATH: .github/scripts/yarf/keywords_listener.py
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        lfs: true
        fetch-depth: ${{ matrix.fetch-depth || 1 }}
        persist-credentials: false

    - uses: ./.github/actions/setup-yarf-noble
      with:
        with-mir: ${{ matrix.with-mir }}

    - name: Run ${{ matrix.name }}
      env:
        SCRIPT: ${{ matrix.script }}
      # shellcheck disable=SC2086  # SCRIPT may include the script's argument
      run: ./.github/scripts/yarf/${SCRIPT}

    - if: matrix.slug == 'unit'
      name: Upload Coverage Report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: coverage
        path: ./coverage_html_report
        retention-days: 5
        overwrite: true

    - if: failure()
      name: Collect test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: yarf-output-${{ matrix.slug }}
        path: /tmp/yarf-outdir/*
        retention-days: 5
        if-no-files-found: ignore
        overwrite: true

    - if: failure() && runner.debug
      name: Setup upterm session (restart with "Enable debug logging" to activate)
      uses: canonical/action-tmate@a0e8caed3bba2ccb98901a274553bf1284ad96c2  # zizmor: ignore[stale-action-refs]
      with:
        limit-access-to-actor: true

  keyword-tests-noble:
    name: Noble - Keyword tests (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    needs: install-noble
    strategy:
      fail-fast: false
      matrix:
        suite:
          - video_image_test
          - video_text_test
          - video_video_test
          - hid_keyboard_test
          - hid_pointer_test
          - kvm_test
          - llm_client_test
    env:
      KEYWORDS_LISTENER_PATH: .github/scripts/yarf/keywords_listener.py
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        lfs: true
        persist-credentials: false

    - uses: ./.github/actions/setup-yarf-noble
      with:
        with-mir: "true"

    - name: Run Noble - Keyword tests (${{ matrix.suite }})
      env:
        SUITE: ${{ matrix.suite }}
      run: ./.github/scripts/yarf/run-keyword-suite.sh "${SUITE}"

    - name: Upload per-suite keyword coverage
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: keywords-coverage-keyword-${{ matrix.suite }}
        path: keywords_coverage.json
        retention-days: 1
        if-no-files-found: error
        overwrite: true

    - if: failure()
      name: Collect test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: yarf-output-keyword-${{ matrix.suite }}
        path: /tmp/yarf-outdir/*
        retention-days: 5
        if-no-files-found: ignore
        overwrite: true

    - if: failure() && runner.debug
      name: Setup upterm session (restart with "Enable debug logging" to activate)
      uses: canonical/action-tmate@a0e8caed3bba2ccb98901a274553bf1284ad96c2  # zizmor: ignore[stale-action-refs]
      with:
        limit-access-to-actor: true

  keyword-coverage-noble:
    name: Noble - Keyword coverage check
    runs-on: ubuntu-latest
    needs: keyword-tests-noble
    if: always()
    env:
      KEYWORDS_COVERAGE_CHECKER: .github/scripts/yarf/check_unused_keywords.py
      COVERAGE_MERGER: .github/scripts/yarf/merge-keywords-coverage.py
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - name: Download per-suite coverage artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        path: coverage-artifacts
        pattern: keywords-coverage-*

    - name: Merge keyword coverage
      run: python3 ${COVERAGE_MERGER} coverage-artifacts

    - name: Check Keywords coverage
      run: |
        pip install tabulate
        python3 ${KEYWORDS_COVERAGE_CHECKER}
