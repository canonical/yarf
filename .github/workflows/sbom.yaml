name: YARF Snap - Software Bill of Materials (SBOM)
on:
  workflow_call:
    inputs:
      CHANNEL:
        description: 'YARF snap channel (e.g., latest/stable)'
        type: string
        default: latest/stable
        required: true

  workflow_dispatch:
    inputs:
      CHANNEL:
        description: 'YARF snap channel (e.g., latest/stable)'
        type: string
        default: latest/stable
        required: true

permissions:
  contents: read  # Required to check out repository code

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: YARF Snap - Software Bill of Materials (SBOM)
    runs-on:
      - self-hosted-linux-amd64-noble-private-endpoint-medium
    steps:
      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y \
            git-lfs

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          lfs: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install python dependencies
        run: |
          pip install requests

      - name: Request and retrieve SBOM
        id: sbom
        env:
          SBOM_SCRIPT_PATH: .github/scripts/sbom/sbom.py
          YARF_CHANNEL: ${{ inputs.CHANNEL }}
        run: python3 -u ${SBOM_SCRIPT_PATH} --channel=${YARF_CHANNEL}

      - name: Collect SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: yarf-${{ steps.sbom.outputs.revision }}-sbom
          path: /tmp/yarf-${{ steps.sbom.outputs.revision }}.sbom.json
          retention-days: 5
