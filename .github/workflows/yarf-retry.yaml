name: Re-run failed YARF jobs

# Listens for the main YARF workflow to finish. If it failed and the run
# has been attempted fewer than 3 times, calls the rerun-failed-jobs API
# to re-run just the failed jobs as a new attempt of the same run.
#
# This lives in its own workflow because rerun-failed-jobs cannot be
# called from within the run it targets (the API returns 403 while the
# run is still in progress).
#
# Caveat: workflow_run triggers use the workflow definition from the
# default branch. Until this file is merged to main, retries will not
# fire for the parent workflow.

on:
  workflow_run:
    workflows: ["Testing and quality control for YARF codebase"]
    types: [completed]

permissions:
  actions: write  # Required for the rerun-failed-jobs API

jobs:
  rerun:
    name: Re-run failed jobs
    runs-on: ubuntu-24.04
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    steps:
    - name: Trigger rerun-failed-jobs
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.event.workflow_run.id }}
        ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      run: |
        echo "::warning::Run ${RUN_ID} failed on attempt ${ATTEMPT}/3, triggering rerun-failed-jobs"
        gh api -X POST "/repos/${REPO}/actions/runs/${RUN_ID}/rerun-failed-jobs"
